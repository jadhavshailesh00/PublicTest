name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet packages
      run: nuget restore

    - name: Build with MSBuild
      run: msbuild /p:Configuration=Release

    - name: Publish the project
      run: msbuild /target:WebPublish /property:Configuration=Release /property:WebPublishMethod=FileSystem /property:DeleteExistingFiles=True /property:publishUrl=./publish

    - name: Deploy to IIS server
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish
        server-dir: /path/to/your/site # Update this to your site's directory on the server
        protocol: ftps # Use ftp if you are not using a secure connection

    - name: Verify deployment
      run: |
        echo "Deployment completed. Visit your site to verify the changes."
